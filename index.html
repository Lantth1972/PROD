<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>产线监控-全自动计算版</title>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --danger: #ff4d4f; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; font-size: 13px; }
        .header { background: #001529; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .btn-group { display: flex; gap: 5px; }
        .btn { border: none; padding: 8px 10px; border-radius: 4px; color: white; cursor: pointer; font-size: 12px; }
        .table-container { width: 100%; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #fafafa; padding: 12px 8px; border-bottom: 2px solid #f0f0f0; color: #595959; }
        td { border-bottom: 1px solid #f0f0f0; padding: 10px 8px; text-align: center; }

        /* 状态与报警 */
        .status-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; }
        .status-ok { background: var(--success); }
        .status-fail { background: var(--danger); animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        tr.alarm-row { background: #fff1f0 !important; }

        .summary-card { margin: 15px; background: white; padding: 15px; border-radius: 8px; border-top: 4px solid #722ed1; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .sum-table { width: 100%; border-collapse: collapse; }
        .sum-table th { text-align: left; color: #722ed1; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .sum-table td { padding: 10px 0; border-bottom: 1px dashed #eee; }

        /* 输入框优化 */
        input { border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px; width: 55px; text-align: center; }
        .name-box { width: 85px; text-align: left; font-weight: bold; border:none; background:transparent; }
        .highlight-input { border-color: var(--primary); background: #f0f7ff; }
        .info-small { font-size: 10px; color: #999; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div class="header">
    <strong>生产实时监控 (自动日目标版)</strong>
    <div class="btn-group">
        <button class="btn" style="background:#fa8c16" onclick="exportData()">导出报表</button>
        <button class="btn" style="background:var(--primary)" onclick="addRow()">+ 新增设备</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>设备/产品编号</th>
                <th>周期(s)</th>
                <th>穴数</th>
                <th>时目标</th>
                <th>计划时长(h)</th>
                <th>已生产</th>
                <th>日进度</th>
                <th>状态</th>
                <th>更新时间</th>
                <th>自动日目标</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div class="summary-card">
    <table class="sum-table">
        <thead><tr><th colspan="3">📊 产品编号实时汇总</th></tr></thead>
        <tbody id="summaryTable"></tbody>
    </table>
</div>

<script>
    // 数据增加一个 workHour 字段
    var lines = JSON.parse(localStorage.getItem('PROD_AUTO_V8')) || [
        { id: 1, name: '1号机', pcode: 'P01', cyc: 60, cav: 10, workHour: 8, count: 0, lastTime: '-', startTime: new Date().getTime() }
    ];

    function render() {
        var tbody = document.getElementById('mainTable');
        var sbody = document.getElementById('summaryTable');
        var now = new Date().getTime();
        var html = '';
        var summary = {};

        for (var i = 0; i < lines.length; i++) {
            var d = lines[i];
            
            // 1. 自动计算：时目标 = (3600 / 周期) * 穴数
            var hTarget = Math.floor((3600 / (d.cyc || 1)) * (d.cav || 1));
            
            // 2. 自动计算：日目标 = 时目标 * 计划时长
            var dTarget = Math.floor(hTarget * (d.workHour || 0));
            
            // 3. 报警计算：已开机时间产生的理论应产
            var passedSeconds = (now - d.startTime) / 1000;
            var expectNow = Math.floor(passedSeconds * (hTarget / 3600));
            var isFail = (d.count < expectNow) && (passedSeconds > 10);
            
            // 4. 进度百分比
            var rate = dTarget > 0 ? ((d.count / dTarget) * 100).toFixed(1) : 0;

            // 5. 汇总逻辑
            if (!summary[d.pcode]) summary[d.pcode] = { c: 0, t: 0, h: 0 };
            summary[d.pcode].c += Number(d.count);
            summary[d.pcode].t += Number(dTarget);
            summary[d.pcode].h += Number(d.workHour);

            html += '<tr class="' + (isFail ? 'alarm-row' : '') + '">' +
                '<td>' +
                    '<input class="name-box" value="'+d.name+'" oninput="edit('+d.id+',\'name\',this.value)">' +
                    '<input class="name-box" style="color:#722ed1;font-size:11px" value="'+d.pcode+'" oninput="edit('+d.id+',\'pcode\',this.value)">' +
                '</td>' +
                '<td><input type="number" value="'+d.cyc+'" oninput="edit('+d.id+',\'cyc\',this.value)"></td>' +
                '<td><input type="number" value="'+d.cav+'" oninput="edit('+d.id+',\'cav\',this.value)"></td>' +
                '<td style="color:var(--primary);font-weight:bold">'+hTarget+'</td>' +
                '<td><input type="number" step="0.5" class="highlight-input" value="'+(d.workHour || 0)+'" oninput="edit('+d.id+',\'workHour\',this.value)"></td>' +
                '<td style="font-size:18px;font-weight:bold">'+d.count+'</td>' +
                '<td>'+rate+'%</td>' +
                '<td><span class="status-tag '+(isFail?'status-fail':'status-ok')+'">'+(isFail?'滞后':'正常')+'</span></td>' +
                '<td>'+d.lastTime+'<span class="info-small">应产: '+expectNow+'</span></td>' +
                '<td style="font-weight:bold; color:#595959">'+dTarget+'</td>' +
                '<td>' +
                    '<button style="background:var(--success);color:white;border:none;padding:10px;border-radius:4px" onclick="report('+d.id+')">录入</button>' +
                    '<button style="border:none;background:none;color:#ccc;font-size:10px;margin-top:4px" onclick="reset('+d.id+')">重置</button>' +
                '</td>' +
            '</tr>';
        }
        tbody.innerHTML = html;

        var sHtml = '';
        for (var k in summary) {
            var sRate = summary[k].t > 0 ? ((summary[k].c / summary[k].t)*100).toFixed(1) : 0;
            sHtml += '<tr>' +
                '<td>产品: <b>'+k+'</b></td>' +
                '<td>总产: <b>'+summary[k].c+'</b> / 总目标: '+summary[k].t+'</td>' +
                '<td style="text-align:right">总进度: <b style="color:var(--success)">'+sRate+'%</b></td>' +
            '</tr>';
        }
        sbody.innerHTML = sHtml || '<tr><td>请录入产品编号</td></tr>';
        localStorage.setItem('PROD_AUTO_V8', JSON.stringify(lines));
    }

    function edit(id, f, v) {
        var line = lines.find(function(l){ return l.id === id });
        if(line) {
            line[f] = (f==='name'||f==='pcode') ? v : Number(v);
            localStorage.setItem('PROD_AUTO_V8', JSON.stringify(lines));
            // 联动计算：停止输入1.5秒后自动刷新所有目标数值
            clearTimeout(window.rt); window.rt = setTimeout(render, 1500);
        }
    }

    function report(id) {
        var n = prompt("输入本次新增产量:");
        if(n && !isNaN(n)) {
            var line = lines.find(function(l){ return l.id === id });
            line.count += Number(n);
            var t = new Date();
            line.lastTime = t.getHours()+":"+String(t.getMinutes()).padStart(2,'0')+":"+String(t.getSeconds()).padStart(2,'0');
            render();
        }
    }

    function addRow() {
        lines.push({ id: Date.now(), name: '新设备', pcode: 'P01', cyc: 60, cav: 1, workHour: 8, count: 0, lastTime: '-', startTime: new Date().getTime() });
        render();
    }

    function reset(id) {
        if(confirm("重置将重新开始计算该台产量的“达标状态”，确定吗？")) {
            var line = lines.find(function(l){ return l.id === id });
            line.count = 0; line.startTime = new Date().getTime(); line.lastTime = '已重置';
            render();
        }
    }

    function exportData() {
        var csv = "\uFEFF设备,产品,周期,穴数,计划时长,产量,自动日目标,更新时间\n";
        lines.forEach(function(l){ 
            var ht = Math.floor((3600/l.cyc)*l.cav);
            csv += l.name+","+l.pcode+","+l.cyc+","+l.cav+","+l.workHour+","+l.count+","+(ht*l.workHour)+","+l.lastTime+"\n"; 
        });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = "生产报表_"+new Date().toISOString().slice(0,10)+".csv";
        a.click();
    }

    setInterval(render, 10000); 
    render();
</script>
</body>
</html>
