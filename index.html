<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>产线生产看板-全功能增强版</title>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --danger: #ff4d4f; --warning: #faad14; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; font-size: 13px; }
        
        .header { background: #001529; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .btn-group { display: flex; gap: 5px; }
        .btn { border: none; padding: 8px 10px; border-radius: 4px; color: white; font-size: 12px; cursor: pointer; }

        .table-container { width: 100%; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #fafafa; padding: 12px 8px; border-bottom: 2px solid #f0f0f0; }
        td { border-bottom: 1px solid #f0f0f0; padding: 10px 8px; text-align: center; }

        /* 状态样式 */
        .status-tag { padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .status-ok { background: #f6ffed; color: var(--success); border: 1px solid #b7eb8f; }
        .status-fail { background: #fff1f0; color: var(--danger); border: 1px solid #ffa39e; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* 汇总卡片 */
        .summary-card { margin: 15px; background: white; padding: 15px; border-radius: 8px; border-top: 4px solid #722ed1; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .sum-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .sum-table th { background: #f9f0ff; color: #722ed1; padding: 8px; }
        .sum-table td { padding: 10px; border-bottom: 1px solid #f0f0f0; }

        input { border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px; width: 65px; text-align: center; }
        .name-box { width: 90px; text-align: left; font-weight: bold; }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.5s; }
    </style>
</head>
<body>

<div class="header">
    <strong>生产监控汇总</strong>
    <div class="btn-group">
        <button class="btn" style="background:#fa8c16" onclick="exportData()">导出Excel</button>
        <button class="btn" style="background:var(--primary)" onclick="addRow()">+设备</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>设备/产品编号</th>
                <th>周期(s)</th>
                <th>穴数</th>
                <th>时目标</th>
                <th>已生产</th>
                <th>达成率</th>
                <th>状态</th>
                <th>更新时间</th>
                <th>日目标</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div class="summary-card">
    <div style="font-weight:bold; color:#722ed1; font-size:15px;">📊 同产品编号实时汇总</div>
    <table class="sum-table">
        <thead>
            <tr>
                <th>产品编号</th>
                <th>机台总数</th>
                <th>累计产量</th>
                <th>累计目标</th>
                <th>整体进度</th>
            </tr>
        </thead>
        <tbody id="summaryTable"></tbody>
    </table>
</div>

<script>
    var lines = JSON.parse(localStorage.getItem('PROD_SYSTEM_V6')) || [
        { id: 1, name: '1号机', pcode: 'P001', cyc: 60, cav: 10, target: 5000, count: 0, lastTime: '-', startTime: new Date().getTime() }
    ];

    function render() {
        var tbody = document.getElementById('mainTable');
        var stody = document.getElementById('summaryTable');
        var now = new Date().getTime();
        var html = '';
        var summaryMap = {}; // 用于汇总

        for (var i = 0; i < lines.length; i++) {
            var item = lines[i];
            
            // 1. 自动换算小时目标
            var hTarget = Math.floor((3600 / (item.cyc || 1)) * (item.cav || 1));
            
            // 2. 状态判定（按开机时长计算应产）
            var passedHrs = (now - item.startTime) / 3600000;
            var expectedNow = Math.floor(passedHrs * hTarget);
            var isOk = item.count >= expectedNow || passedHrs < 0.01;
            
            // 3. 达成率计算
            var rate = item.target > 0 ? ((item.count / item.target) * 100).toFixed(1) : 0;

            // 4. 产品汇总逻辑 (依据产品编号 Pcode)
            var code = item.pcode || "未命名";
            if (!summaryMap[code]) {
                summaryMap[code] = { count: 0, target: 0, devices: 0 };
            }
            summaryMap[code].count += Number(item.count);
            summaryMap[code].target += Number(item.target);
            summaryMap[code].devices += 1;

            html += '<tr class="' + (isOk ? '' : 'alarm') + '">' +
                '<td>' +
                    '<input class="name-box" value="'+item.name+'" oninput="edit('+item.id+',\'name\',this.value)">' +
                    '<input class="name-box" style="color:#722ed1;font-size:11px" value="'+item.pcode+'" oninput="edit('+item.id+',\'pcode\',this.value)">' +
                '</td>' +
                '<td><input type="number" value="'+item.cyc+'" oninput="edit('+item.id+',\'cyc\',this.value)"></td>' +
                '<td><input type="number" value="'+item.cav+'" oninput="edit('+item.id+',\'cav\',this.value)"></td>' +
                '<td style="color:var(--primary);font-weight:bold">'+hTarget+'</td>' +
                '<td style="font-size:18px;font-weight:bold">'+item.count+'</td>' +
                '<td>'+rate+'%<div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(100,rate)+'%"></div></div></td>' +
                '<td><span class="status-tag '+(isOk?'status-ok':'status-fail')+'">'+(isOk?'✅ 达标':'❌ 滞后')+'</span></td>' +
                '<td style="color:#999;font-size:11px">'+item.lastTime+'</td>' +
                '<td><input type="number" value="'+item.target+'" oninput="edit('+item.id+',\'target\',this.value)"></td>' +
                '<td>' +
                    '<button style="background:var(--success);color:white;border:none;padding:10px;border-radius:4px;cursor:pointer" onclick="report('+item.id+')">录入</button>' +
                    '<button style="border:none;background:none;color:#ccc;font-size:10px;display:block;margin:auto" onclick="reset('+item.id+')">重置</button>' +
                '</td>' +
            '</tr>';
        }
        tbody.innerHTML = html;
        localStorage.setItem('PROD_SYSTEM_V6', JSON.stringify(lines));

        // 渲染汇总表
        var sHtml = '';
        for (var key in summaryMap) {
            var s = summaryMap[key];
            var sRate = s.target > 0 ? ((s.count / s.target) * 100).toFixed(1) : 0;
            sHtml += '<tr>' +
                '<td style="font-weight:bold;color:#722ed1">'+key+'</td>' +
                '<td>'+s.devices+' 台</td>' +
                '<td style="font-weight:bold">'+s.count+'</td>' +
                '<td>'+s.target+'</td>' +
                '<td>'+sRate+'%</td>' +
            '</tr>';
        }
        stody.innerHTML = sHtml || '<tr><td colspan="5">请在上方输入产品编号</td></tr>';
    }

    function edit(id, field, val) {
        var line = lines.find(function(l){ return l.id === id });
        if(line) {
            line[field] = (field==='name'||field==='pcode') ? val : Number(val);
            // 实时更新汇总和计算，但不重绘DOM以防丢失焦点
            localStorage.setItem('PROD_SYSTEM_V6', JSON.stringify(lines));
            clearTimeout(window.t);
            window.t = setTimeout(render, 1500); // 停止输入1.5秒后刷新界面显示计算结果
        }
    }

    function report(id) {
        var n = prompt("输入本次新增产量:");
        if(n) {
            var line = lines.find(function(l){ return l.id === id });
            line.count += Number(n);
            var d = new Date();
            line.lastTime = d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0') + ":" + String(d.getSeconds()).padStart(2,'0');
            render();
        }
    }

    function addRow() {
        lines.push({ id: Date.now(), name: '新机台', pcode: 'P01', cyc: 60, cav: 1, target: 1000, count: 0, lastTime: '-', startTime: new Date().getTime() });
        render();
    }

    function reset(id) {
        if(confirm("确定重置？")) {
            var line = lines.find(function(l){ return l.id === id });
            line.count = 0; line.startTime = new Date().getTime(); line.lastTime = '已重置';
            render();
        }
    }

    function exportData() {
        var csv = "\uFEFF设备,产品编号,周期,穴数,产量,目标,更新时间\n";
        lines.forEach(function(l){ csv += l.name+","+l.pcode+","+l.cyc+","+l.cav+","+l.count+","+l.target+","+l.lastTime+"\n"; });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = "生产报表.csv";
        a.click();
    }

    setInterval(render, 10000); // 每10秒自检一次状态
    render();
</script>
</body>
</html>
