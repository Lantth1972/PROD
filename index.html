<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>产线生产看板-触控增强版</title>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --danger: #ff4d4f; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; font-size: 13px; -webkit-tap-highlight-color: transparent; }
        
        .header { background: #001529; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .btn { border: none; padding: 8px 12px; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .add-btn { background: var(--primary); }
        .exp-btn { background: #fa8c16; }

        .table-container { width: 100%; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #fafafa; padding: 12px 10px; border-bottom: 2px solid #f0f0f0; color: #595959; }
        td { border-bottom: 1px solid #f0f0f0; padding: 10px 8px; text-align: center; }

        /* 报警背景 */
        tr.alarm { background: #fff1f0 !important; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { background: #fff1f0; } 50% { background: #ffccc7; } }

        /* 关键：输入框样式优化，确保容易点中 */
        input { 
            border: 1px solid #d9d9d9; 
            border-radius: 4px; 
            padding: 8px 4px; 
            width: 70px; 
            text-align: center; 
            font-size: 13px;
            background: #fff;
            -webkit-appearance: none; /* 移除移动端默认内阴影 */
        }
        .name-input { width: 90px; text-align: left; font-weight: bold; }
        .pcode-input { width: 90px; text-align: left; color: #722ed1; margin-top: 4px; }

        .report-btn { background: var(--success); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; }
        .edit-btn { background: none; border: 1px solid #d9d9d9; color: #8c8c8c; padding: 4px 8px; font-size: 11px; margin-top: 5px; border-radius: 4px; }
        
        .summary-box { margin: 15px; padding: 15px; background: white; border-radius: 8px; border-top: 4px solid #722ed1; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .summary-title { font-weight: bold; color: #722ed1; margin-bottom: 10px; font-size: 15px; }
        .sum-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="header">
    <strong>生产监控汇总</strong>
    <div style="display: flex; gap: 8px;">
        <button class="btn exp-btn" onclick="exportData()">导出</button>
        <button class="btn add-btn" onclick="addRow()">+设备</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>设备/产品编号</th>
                <th>周期(s)</th>
                <th>穴数</th>
                <th>时目标</th>
                <th>已生产</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="summary-box">
    <div class="summary-title">📊 按产品编号统计</div>
    <div id="summaryBody"></div>
</div>

<script>
    // 使用更兼容的变量声明
    var lines = JSON.parse(localStorage.getItem('prodLinesV4')) || [
        { id: 1, name: '1号机', product: 'P001', cycle: 60, cavity: 10, dTarget: 5000, count: 0, startTime: new Date().getTime() }
    ];

    function render() {
        var tbody = document.getElementById('tableBody');
        var summaryBody = document.getElementById('summaryBody');
        var now = new Date().getTime();
        var html = '';
        var summaryMap = {};

        for (var i = 0; i < lines.length; i++) {
            var item = lines[i];
            // 计算逻辑
            var hTarget = Math.floor((3600 / (item.cycle || 1)) * (item.cavity || 1));
            var hoursPassed = (now - item.startTime) / 3600000;
            var expectedNow = Math.floor(hoursPassed * hTarget);
            var isAlarm = (item.count < expectedNow) && (hoursPassed > 0.01); // 运行30秒后开始报

            // 汇总逻辑
            var p = item.product || '未设置';
            if (!summaryMap[p]) summaryMap[p] = { c: 0, t: 0 };
            summaryMap[p].c += item.count;
            summaryMap[p].t += (item.dTarget || 0);

            html += '<tr class="' + (isAlarm ? 'alarm' : '') + '">' +
                '<td>' +
                    '<input class="name-input" type="text" value="' + item.name + '" oninput="updateVal(' + item.id + ',\'name\',this.value)">' +
                    '<input class="pcode-input" type="text" value="' + item.product + '" oninput="updateVal(' + item.id + ',\'product\',this.value)">' +
                '</td>' +
                '<td><input type="number" value="' + item.cycle + '" oninput="updateVal(' + item.id + ',\'cycle\',this.value)"></td>' +
                '<td><input type="number" value="' + item.cavity + '" oninput="updateVal(' + item.id + ',\'cavity\',this.value)"></td>' +
                '<td style="color:#1890ff; font-weight:bold">' + hTarget + '</td>' +
                '<td style="font-size:16px; font-weight:bold">' + item.count + '</td>' +
                '<td><b style="color:' + (isAlarm ? 'red' : 'green') + '">' + (isAlarm ? '滞后' : '正常') + '</b></td>' +
                '<td>' +
                    '<button class="report-btn" onclick="openReport(' + item.id + ')">录入</button>' +
                    '<button class="edit-btn" onclick="resetLine(' + item.id + ')">重置</button>' +
                '</td>' +
            '</tr>';
        }
        tbody.innerHTML = html;

        // 渲染汇总
        var sHtml = '';
        for (var key in summaryMap) {
            var s = summaryMap[key];
            sHtml += '<div class="sum-item"><span>' + key + '</span><span>已产: <b>' + s.c + '</b> / 目标: ' + s.t + '</span></div>';
        }
        summaryBody.innerHTML = sHtml || '暂无数据';

        localStorage.setItem('prodLinesV4', JSON.stringify(lines));
    }

    // 修改值的方法
    function updateVal(id, field, val) {
        for (var i = 0; i < lines.length; i++) {
            if (lines[i].id === id) {
                lines[i][field] = (field === 'name' || field === 'product') ? val : Number(val);
                break;
            }
        }
        // 注意：这里不要立即调用 render() 否则输入框会失去焦点
        localStorage.setItem('prodLinesV4', JSON.stringify(lines));
    }

    function openReport(id) {
        var val = prompt("请输入本次新增产量:");
        if (val !== null && val !== "") {
            for (var i = 0; i < lines.length; i++) {
                if (lines[i].id === id) {
                    lines[i].count += Number(val);
                    break;
                }
            }
            render();
        }
    }

    function addRow() {
        lines.push({ id: Date.now(), name: '新设备', product: 'P01', cycle: 60, cavity: 1, dTarget: 1000, count: 0, startTime: new Date().getTime() });
        render();
    }

    function resetLine(id) {
        if(confirm("重置将清零该台数据并重新计时，确定？")) {
            for (var i = 0; i < lines.length; i++) {
                if (lines[i].id === id) {
                    lines[i].count = 0;
                    lines[i].startTime = new Date().getTime();
                    break;
                }
            }
            render();
        }
    }

    function exportData() {
        var csv = "\uFEFF设备,产品,周期,穴数,产量\n";
        for (var i = 0; i < lines.length; i++) {
            var li = lines[i];
            csv += li.name + "," + li.product + "," + li.cycle + "," + li.cavity + "," + li.count + "\n";
        }
        var blob = new Blob([csv], { type: 'text/csv' });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "生产报表.csv";
        a.click();
    }

    // 自动刷新状态（但不重绘DOM，防止干扰输入）
    setInterval(function() {
        // 仅在非输入状态下小幅度刷新（可选，或者直接手动刷新）
    }, 10000);
    
    render();
</script>
</body>
</html>
