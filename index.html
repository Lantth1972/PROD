<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>产线生产看板-全功能版</title>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --danger: #ff4d4f; --text: #262626; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        /* 顶部导航 */
        .header { background: #001529; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header b { font-size: 16px; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; padding: 8px 12px; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .add-btn { background: var(--primary); }
        .exp-btn { background: #fa8c16; }

        /* 表格容器 */
        .table-container { width: 100%; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #fafafa; padding: 12px 8px; border-bottom: 2px solid #f0f0f0; font-size: 13px; color: #595959; }
        td { border-bottom: 1px solid #f0f0f0; padding: 12px 8px; text-align: center; font-size: 14px; }

        /* 报警行 */
        tr.alarm { background: #fff1f0 !important; }
        tr.alarm td { color: var(--danger); font-weight: bold; }

        /* 输入框样式 */
        input { border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px; width: 65px; text-align: center; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        .name-box { width: 100px; text-align: left; margin-bottom: 4px; font-weight: bold; }

        /* 进度条样式 */
        .progress-container { width: 80px; background: #f5f5f5; border-radius: 10px; height: 8px; margin: 4px auto; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; transition: width 0.3s; }
        .rate-text { font-size: 12px; font-weight: bold; color: var(--success); }

        /* 按钮 */
        .report-btn { background: var(--success); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; }
        .reset-btn { border: none; background: none; color: #bfbfbf; font-size: 11px; cursor: pointer; margin-top: 5px; }

        /* 底部汇总 */
        .summary-card { margin: 15px; background: white; padding: 15px; border-radius: 8px; border-top: 4px solid #722ed1; }
        .sum-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="header">
    <b>产线生产监控系统</b>
    <div class="btn-group">
        <button class="btn exp-btn" onclick="exportData()">导出报表</button>
        <button class="btn add-btn" onclick="addRow()">+ 新增设备</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>设备/产品</th>
                <th>周期(s)</th>
                <th>穴数</th>
                <th>时目标</th>
                <th>已生产</th>
                <th>达成率</th>
                <th>更新时间</th>
                <th>日目标</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<div class="summary-card">
    <div style="font-weight:bold; color:#722ed1; margin-bottom:10px">📊 产品维度汇总</div>
    <div id="summaryContent"></div>
</div>

<script>
    // 数据持久化
    var lines = JSON.parse(localStorage.getItem('MES_V5')) || [
        { id: 1, name: '1号机', pcode: 'P001', cyc: 60, cav: 10, target: 5000, count: 0, lastTime: '-', start: new Date().getTime() }
    ];

    function render() {
        var html = '';
        var summary = {};
        var now = new Date().getTime();

        for (var i = 0; i < lines.length; i++) {
            var item = lines[i];
            
            // 1. 自动计算小时目标
            var hTarget = Math.floor((3600 / (item.cyc || 1)) * (item.cav || 1));
            
            // 2. 计算日达成率
            var rate = item.target > 0 ? ((item.count / item.target) * 100).toFixed(1) : 0;
            
            // 3. 计算预警 (按秒级进度计算)
            var passedHrs = (now - item.start) / 3600000;
            var expect = Math.floor(passedHrs * hTarget);
            var isAlarm = (item.count < expect) && (passedHrs > 0.01);

            // 汇总计算
            if (!summary[item.pcode]) summary[item.pcode] = { c: 0, t: 0, count: 0 };
            summary[item.pcode].c += item.count;
            summary[item.pcode].t += (item.target || 0);
            summary[item.pcode].count++;

            html += '<tr class="' + (isAlarm ? 'alarm' : '') + '">' +
                '<td>' +
                    '<input class="name-box" type="text" value="' + item.name + '" oninput="edit(' + item.id + ',\'name\',this.value)">' +
                    '<input class="name-box" style="color:#722ed1;font-size:12px" type="text" value="' + item.pcode + '" oninput="edit(' + item.id + ',\'pcode\',this.value)">' +
                '</td>' +
                '<td><input type="number" value="' + item.cyc + '" oninput="edit(' + item.id + ',\'cyc\',this.value)"></td>' +
                '<td><input type="number" value="' + item.cav + '" oninput="edit(' + item.id + ',\'cav\',this.value)"></td>' +
                '<td style="color:#1890ff; font-weight:bold">' + hTarget + '</td>' +
                '<td style="font-size:18px; font-weight:bold">' + item.count + '</td>' +
                '<td>' +
                    '<div class="rate-text">' + rate + '%</div>' +
                    '<div class="progress-container"><div class="progress-bar" style="width:' + Math.min(100, rate) + '%"></div></div>' +
                '</td>' +
                '<td style="font-size:12px; color:#8c8c8c">' + item.lastTime + '</td>' +
                '<td><input type="number" value="' + item.target + '" oninput="edit(' + item.id + ',\'target\',this.value)"></td>' +
                '<td>' +
                    '<button class="report-btn" onclick="report(' + item.id + ')">报工</button>' +
                    '<button class="reset-btn" onclick="reset(' + item.id + ')">重置</button>' +
                '</td>' +
            '</tr>';
        }
        document.getElementById('mainTable').innerHTML = html;
        localStorage.setItem('MES_V5', JSON.stringify(lines));

        // 渲染汇总
        var sHtml = '';
        for (var key in summary) {
            var s = summary[key];
            var sRate = s.t > 0 ? ((s.c / s.t) * 100).toFixed(1) : 0;
            sHtml += '<div class="sum-row">' +
                '<span><b>' + key + '</b> (' + s.count + '台机)</span>' +
                '<span>总产量: <b>' + s.c + '</b> / 总进度: <b style="color:var(--success)">' + sRate + '%</b></span>' +
            '</div>';
        }
        document.getElementById('summaryContent').innerHTML = sHtml || '暂无数据';
    }

    function edit(id, field, val) {
        for (var i = 0; i < lines.length; i++) {
            if (lines[i].id === id) {
                lines[i][field] = (field === 'name' || field === 'pcode') ? val : Number(val);
                break;
            }
        }
        // 为了输入不卡顿，这里只存数据，不实时render（除非改的是影响计算的字段）
        localStorage.setItem('MES_V5', JSON.stringify(lines));
        if(field !== 'name' && field !== 'pcode') {
             // 延时刷新，避免输入数字时跳动
             clearTimeout(window.renderTimer);
             window.renderTimer = setTimeout(render, 1000);
        }
    }

    function report(id) {
        var val = prompt("请输入新增产量 (例如: 500):");
        if (val) {
            for (var i = 0; i < lines.length; i++) {
                if (lines[i].id === id) {
                    lines[i].count += Number(val);
                    var t = new Date();
                    lines[i].lastTime = t.getHours() + ":" + String(t.getMinutes()).padStart(2, '0') + ":" + String(t.getSeconds()).padStart(2, '0');
                    break;
                }
            }
            render();
        }
    }

    function addRow() {
        lines.push({ id: Date.now(), name: '新设备', pcode: 'P01', cyc: 60, cav: 1, target: 1000, count: 0, lastTime: '-', start: new Date().getTime() });
        render();
    }

    function reset(id) {
        if(confirm("确定要清零该台设备数据并重新计时吗？")) {
            for (var i = 0; i < lines.length; i++) {
                if (lines[i].id === id) {
                    lines[i].count = 0;
                    lines[i].start = new Date().getTime();
                    lines[i].lastTime = '已重置';
                    break;
                }
            }
            render();
        }
    }

    function exportData() {
        var csv = "\uFEFF设备,产品,周期,穴数,时目标,已生产,日目标,达成率,更新时间\n";
        for (var i = 0; i < lines.length; i++) {
            var l = lines[i];
            var ht = Math.floor((3600/l.cyc)*l.cav);
            var rt = ((l.count/l.target)*100).toFixed(1) + "%";
            csv += l.name + "," + l.pcode + "," + l.cyc + "," + l.cav + "," + ht + "," + l.count + "," + l.target + "," + rt + "," + l.lastTime + "\n";
        }
        var blob = new Blob([csv], { type: 'text/csv' });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "生产报表_" + new Date().toLocaleDateString() + ".csv";
        a.click();
    }

    // 每10秒自动检查一次报警状态
    setInterval(render, 10000);
    render();
</script>
</body>
</html>
